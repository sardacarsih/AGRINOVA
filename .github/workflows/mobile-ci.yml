name: Mobile CI

on:
  push:
    branches: [main, develop, graphql]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-ci.yml"
      - ".github/workflows/android-release.yml"
  pull_request:
    branches: [main, develop, graphql]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-ci.yml"
      - ".github/workflows/android-release.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.38.9"
  # Phase 1: non-fatal infos/warnings
  # Phase 2 (current): --no-fatal-infos
  # Phase 3: (empty) full strict analyze
  MOBILE_ANALYZE_FLAGS: "--no-fatal-infos"

concurrency:
  group: mobile-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Mobile Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Analyze
        working-directory: apps/mobile
        run: flutter analyze $MOBILE_ANALYZE_FLAGS

      - name: Run smoke tests
        working-directory: apps/mobile
        run: flutter test test/widget_test.dart
