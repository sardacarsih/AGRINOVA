query GetPerawatanRecords {
  perawatanRecords {
    id
    blockId
    block {
      id
      blockCode
      name
      divisionId
    }
    jenisPerawatan
    tanggalPerawatan
    pekerjaId
    pekerja {
      id
      name
      role
      effectiveMandorType
    }
    luasArea
    pupukDigunakan
    herbisidaDigunakan
    catatan
    status
    createdAt
    updatedAt
  }
}

query GetPerawatanMaterialUsageRecords {
  perawatanMaterialUsageRecords {
    id
    perawatanRecordId
    materialCategory
    materialName
    quantity
    unit
    unitPrice
    totalCost
    createdAt
    updatedAt
    perawatanRecord {
      id
      jenisPerawatan
      tanggalPerawatan
      status
      block {
        id
        blockCode
        name
      }
    }
  }
}

query GetPerawatanMaterialUsageRecord($id: ID!) {
  perawatanMaterialUsageRecord(id: $id) {
    id
    perawatanRecordId
    materialCategory
    materialName
    quantity
    unit
    unitPrice
    totalCost
    createdAt
    updatedAt
    perawatanRecord {
      id
